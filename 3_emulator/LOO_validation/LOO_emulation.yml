model_run_name: "0case_LOO_emulation_modhighice"
random_state: 29

training_file_path: "training_data/"
X_input_file_name: "emul_in_X_train_modhigh_0.res"
Y_input_file_name: "emul_in_Y_train_modhigh_0.nc"
X_column_names: ["co2", "obliquity", "esinw", "ecosw", "ice"]

cv:
  folds: 10
  n_jobs: -1
  scoring: neg_mean_squared_error

encoder_config:
  encoder_type: PCA
  n_components: 5
  pca_variance_ratio: 0.999

regressor_config:
  kernels:
    - RBF
    - Matern_nu_15
    - Matern_nu_25
  n_restarts_optimizer: 10
  whitekernel_noise_level: 1e-2
  whitekernel_noise_level_bounds: [1e-5, 1e1]

forcing_data_path: "training_data/"
forcing_data:
  0case:
    forcing_input: "emul_in_X_modhigh_0.res"
  1case:
    forcing_input: "emul_in_X_modhigh_1.res"
  2case:
    forcing_input: "emul_in_X_modhigh_2.res"