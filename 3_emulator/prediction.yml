model_run_name: "tas_modhighice"
random_state: 29

training_file_path: "training_data/"
X_input_file_name: ["emul_in_X_modhighice.res"]
Y_input_file_name: ["emul_in_Y_modhighice.nc"]
X_column_names: ["co2", "obliquity", "esinw", "ecosw", "ice"]

output_dir: "trained_model/"

cv:
  folds: 10
  n_jobs: -1
  scoring: neg_mean_squared_error

encoder_config:
  encoder_type: PCA
  n_components: 5
  pca_variance_ratio: 0.999

regressor_config:
  kernels:
    - RBF
    - Matern_nu_15
    - Matern_nu_25
  n_restarts_optimizer: 10
  whitekernel_noise_level: 1e-2
  whitekernel_noise_level_bounds: [1e-5, 1e1]

forcing_data_path: "../2_GSL_model/results/emul_inputs_updatedCO2/"
forcing_data:
  natural:
    kind: pattern
    forcing_input_pattern: "emul_inputs_natural.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1
  SSP126:
    kind: pattern
    forcing_input_pattern: "emul_inputs_SSP126.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1
  SSP245:
    kind: pattern
    forcing_input_pattern: "emul_inputs_SSP245.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1
  SSP370:
    kind: pattern
    forcing_input_pattern: "emul_inputs_SSP370.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1
  SSP585:
    kind: pattern
    forcing_input_pattern: "emul_inputs_SSP585.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1
  10000PGC:
    kind: pattern
    forcing_input_pattern: "emul_inputs_10000PGC.{member}.updated.res"
    member:
      start: 1
      end: 90
      width: 1